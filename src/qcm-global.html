<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Compteur de points QCM - Correction globale</title>
    <link href="../css/style.css" rel="stylesheet">
</head>

<body>

<div class="back-link">
    <a href="index.html">← Retour à l'accueil</a>
</div>

<h1>Compteur de points QCM</h1>

<div id="setup">
    <label for="qcmTitle">Titre du QCM</label>
    <input id="qcmTitle" placeholder="Ex: Mathématiques - Chapitre 3" type="text">
    <p class="error-message" id="errorQcmTitle"></p>

    <label for="nbQuestions">Combien de questions comporte ce QCM ?</label>
    <input id="nbQuestions" min="1" type="number">
    <p class="error-message" id="errorNbQuestions"></p>

    <label for="nbChoix">Combien de choix sont disponibles à chaque question ?</label>
    <input id="nbChoix" min="1" type="number">
    <p class="error-message" id="errorNbChoix"></p>

    <label for="displayMode">Comment afficher les choix ?</label>
    <select id="displayMode">
        <option value="literal">Littéral (A, B, C...)</option>
        <option value="numeric">Numérique (1, 2, 3...)</option>
    </select>

    <br>
    <button id="startBtn" onclick="startQCM()">Valider</button>
</div>

<div class="hidden" id="qcm">
    <h2>Répondez à toutes les questions</h2>
    <p class="muted-helper">Vous verrez la correction après avoir répondu à toutes les questions</p>

    <div id="questionsContainer"></div>

    <p class="error-message" id="errorQuestion"></p>

    <br>
    <button id="validerBtn" onclick="validerQCM()">Voir les résultats</button>
</div>

<div class="hidden" id="resultFinal">
    <h2>Résultats</h2>
    <div id="correctionContainer"></div>
    <h2 id="noteFinale"></h2>
    <button onclick="telechargerPDF()">📥 Télécharger le récapitulatif</button>
    <button onclick="resetQCM()">Recommencer un QCM</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="../js/script-global.js"></script>
</body>
</html>
